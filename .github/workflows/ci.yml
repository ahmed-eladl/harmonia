name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Test CLI
        env:
          PYTHONUTF8: "1"
        run: |
          harmonia --version
          harmonia check --json
          harmonia matrix pytorch
          harmonia matrix transformers
          harmonia conflicts
          harmonia suggest torch==2.5.1
          harmonia suggest transformers==4.44.2

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check harmonia/ tests/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Verify data is bundled
        run: |
          pip install dist/*.whl
          python -c "from harmonia.database import load_db; db = load_db('pytorch'); print(f'OK: {len(db[\"packages\"][\"torch\"])} torch versions')"
          python -c "from harmonia.database import load_db; db = load_db('transformers'); print(f'OK: {len(db[\"packages\"][\"transformers\"])} transformers versions')"
